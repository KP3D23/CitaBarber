<!-- Encabezado con tasas siempre visibles -->
<header class="header">
    <div class="header-top">
        <h1>Kawaproyects3d</h1>
        <button id="btn-logout" class="btn-sm">Salir 🚪</button>
    </div>
    <div class="rates-panel">
        <div class="rate-input">
            <label>Tasa BCV:</label>
            <input type="number" id="tasa-bcv" step="0.01">
        </div>
        <div class="rate-input">
            <label>Tasa USDT:</label>
            <input type="number" id="tasa-usdt" step="0.01">
        </div>
    </div>
</header>

<!-- Dashboard: Tarjetas de balance -->
<section class="summary-panel">
    <div class="card card-deben"><h3>Me Deben</h3><p id="total-deben">0.00</p></div>
    <div class="card card-debo"><h3>Debo</h3><p id="total-debo">0.00</p></div>
    <div class="card card-libres"><h3>Capital</h3><p id="total-libres">0.00</p></div>
</section>

<!-- Botones de Acción -->
<div class="action-bar">
    <button id="btn-open-modal" class="btn-main">⇆ Registrar Movimiento</button>
    <button id="btn-toggle-list" class="btn-sec">Ver Detalles y Listas</button>
</div>

<!-- Modal (Oculto inicialmente) -->
<div id="modal-movimiento" class="modal">
    <div class="modal-content">
        <h2>Nuevo Movimiento</h2>
        <select id="tipo-movimiento">
            <option value="GASTO">Gasto Externo</option>
            <option value="INGRESO">Ingreso</option>
            <option value="PAGO_DEUDA">Pago de Deuda</option>
        </select>
        <!-- Aquí irán los campos dinámicos -->
        <button id="btn-guardar-movimiento">Confirmar</button>
        <button id="btn-close-modal">Cancelar</button>
    </div>
</div>
