<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Kawaproyects3d | Finanzas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="login-container">...</div> <!-- Tu formulario de login actual -->

    <div id="app-screen" style="display: none;">
        <header class="header">
            <div class="header-top">
                <h1>Kawaproyects3d</h1>
                <button id="btn-logout">Salir 🚪</button>
            </div>
            <div class="rates-panel">
                <input type="number" id="tasa-bcv" placeholder="Tasa BCV">
                <input type="number" id="tasa-usdt" placeholder="Tasa USDT">
            </div>
        </header>

        <section class="summary-panel">
            <div class="card card-deben"><h3>Me Deben</h3><p id="total-deben">0.00</p></div>
            <div class="card card-debo"><h3>Debo</h3><p id="total-debo">0.00</p></div>
            <div class="card card-libres"><h3>Capital</h3><p id="total-libres">0.00</p></div>
        </section>

        <div class="action-bar">
            <button id="btn-open-modal" class="btn-main">⇆ Registrar Movimiento</button>
            <button id="btn-toggle-list">Ver Detalles</button>
        </div>

        <div id="details-section" style="display:none;">
            <div class="lists-container">...</div> <!-- Tus listas de siempre -->
            <h2 style="margin-top:20px;">Historial (Recientes)</h2>
            <ul id="lista-historial"></ul>
            <button id="btn-ver-mas">Ver más</button>
        </div>
    </div>

    <!-- Modal de Movimiento -->
    <div id="modal-movimiento" class="modal">
        <div class="modal-content">
            <select id="select-tipo">
                <option value="GASTO">Gasto</option>
                <option value="INGRESO">Ingreso</option>
                <option value="PAGO_DEUDA">Pago de Deuda</option>
            </select>
            <div id="campos-dinamicos"></div>
            <button id="btn-guardar">Confirmar</button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
