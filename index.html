<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawaproyects3d | Finanzas</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Pantalla de Login -->
    <div id="login-screen" class="login-container">
        <h2>Acceso Privado</h2>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btn-login">Entrar</button>
    </div>

    <!-- App Principal (Oculta hasta iniciar sesión) -->
    <div id="app-screen" style="display: none;">
        
        <header class="header">
            <div class="header-top">
                <h1>Kawaproyects3d</h1>
                <button id="btn-logout">Salir 🚪</button>
            </div>
            <div class="rates-panel">
                <div class="rate-input-group">
                    <span class="rate-label">Tasa BCV</span>
                    <input type="number" id="tasa-bcv" placeholder="0.00">
                </div>
                <div class="rate-input-group">
                    <span class="rate-label">Tasa USDT</span>
                    <input type="number" id="tasa-usdt" placeholder="0.00">
                </div>
            </div>
        </header>

        <section class="summary-panel">
            <div class="card card-deben">
                <h3>Me Deben</h3>
                <p id="total-deben">0.00</p>
            </div>
            <div class="card card-debo">
                <h3>Debo</h3>
                <p id="total-debo">0.00</p>
            </div>
            <div class="card card-libres">
                <h3>Capital</h3>
                <p id="total-libres">0.00</p>
            </div>
        </section>

        <!-- Botones Principales -->
        <div class="action-bar">
            <button id="btn-open-modal" class="btn-main">⇆ Registrar Movimiento</button>
            <div class="action-bar-row">
                <button id="btn-toggle-list" class="btn-sec">Ver Detalles y Listas</button>
                <button id="btn-toggle-historial" class="btn-sec">Ver Historial</button>
            </div>
        </div>

        <!-- Sección de Listas (Lado a lado) -->
        <div id="details-section" style="display:none;">
            <div class="lists-container">
                <div class="list-column">
                    <h2 class="list-title">Me Deben</h2>
                    <ul id="lista-deben" class="item-list"></ul>
                </div>
                <div class="list-column">
                    <h2 class="list-title">Debo</h2>
                    <ul id="lista-debo" class="item-list"></ul>
                </div>
            </div>
        </div>

        <!-- Sección de Historial -->
        <div id="historial-section" style="display:none; margin-top:20px;">
            <h2 style="font-size: 1.2rem; margin-bottom:15px; text-align:center;">Historial Reciente</h2>
            <ul id="lista-historial" class="item-list"></ul>
            <button id="btn-ver-mas" style="width: 100%; margin-top: 10px; background:#333;">Ver más</button>
        </div>
    </div>

    <!-- Modal (Ventana Emergente) -->
    <div id="modal-movimiento" class="modal">
        <div class="modal-content">
            <h2>Nuevo Movimiento</h2>
            <select id="select-tipo" style="width:100%; padding:10px; margin-bottom:10px;">
                <option value="GASTO">Gasto Externo</option>
                <option value="INGRESO">Ingreso</option>
                <option value="PAGO_DEUDA">Pago de Deuda</option>
            </select>
            
            <div id="campos-dinamicos">
                <input type="number" id="monto" placeholder="Monto" style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="text" id="desc" placeholder="Descripción" style="width:100%; padding:10px; margin-bottom:10px;">
            </div>
            
            <div style="display:flex; gap:10px; margin-top: 10px;">
                <button id="btn-guardar" style="flex:1;">Confirmar</button>
                <button id="btn-close-modal" style="flex:1; background:#444;">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
