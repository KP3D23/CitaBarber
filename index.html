<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawaproyects3d - Finanzas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Kawaproyects3d | Balance</h1>
        </header>

        <!-- PANEL DE RESUMEN -->
        <section class="summary-panel">
            <div class="card card-deben">
                <h3>Me Deben / Capital</h3>
                <p id="total-deben">0.00</p>
            </div>
            <div class="card card-debo">
                <h3>Debo / Pasivos</h3>
                <p id="total-debo">0.00</p>
            </div>
            <div class="card card-libres">
                <h3>Capital Libre</h3>
                <p id="total-libres">0.00</p>
            </div>
        </section>

        <!-- FORMULARIO DE REGISTRO -->
        <section class="form-section">
            <h2>Nuevo Registro</h2>
            <form id="finance-form">
                <input type="text" id="concepto" placeholder="Concepto (ej: Binance, Zami, Bolsas)" required>
                <input type="number" step="0.01" id="monto" placeholder="Monto ($)" required>
                <select id="tipo" required>
                    <option value="ME_DEBEN">Me Deben / Tengo (Activo)</option>
                    <option value="DEBO">Debo / Pagar (Pasivo)</option>
                </select>
                <button type="submit" class="btn-add">Agregar a la lista</button>
            </form>
        </section>

        <!-- LISTAS DE DATOS -->
        <div class="lists-container">
            <div class="list-block">
                <h3 class="title-deben">ME DEBEN</h3>
                <ul id="lista-deben" class="item-list">
                    <!-- Se llena con JS -->
                </ul>
            </div>
            <div class="list-block">
                <h3 class="title-debo">DEBO</h3>
                <ul id="lista-debo" class="item-list">
                    <!-- Se llena con JS -->
                </ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
